<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>養成記帳好習慣</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="記帳好習慣">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slideDown {
      from {
        transform: translateY(-10px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    html,
    body {
      background-color: #FCE4EC;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
      height: 100%;
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }

    input,
    button {
      -webkit-appearance: none;
      outline: none !important;
      border-radius: 1rem;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #F8BBD0;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const Icon = ({ name, className = "w-4 h-4" }) => {
      const icons = {
        Calendar: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>),
        User: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>),
        Tag: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>),
        DollarSign: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>),
        PenTool: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path></svg>),
        CreditCard: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>),
        CheckCircle2: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>),
        ChevronLeft: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>),
        ChevronRight: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>),
        Loader: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} animate-spin`}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line></svg>),
        History: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>)
      };
      return icons[name] || null;
    };

    const CustomCalendar = ({ selectedDate, onSelect, onClose }) => {
      const dateObj = new Date(selectedDate);
      const [viewDate, setViewDate] = React.useState(new Date(dateObj.getFullYear(), dateObj.getMonth(), 1));
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDayOfMonth = new Date(year, month, 1).getDay();
      const prevMonth = () => setViewDate(new Date(year, month - 1, 1));
      const nextMonth = () => setViewDate(new Date(year, month + 1, 1));
      const days = [];
      for (let i = 0; i < firstDayOfMonth; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);
      const isSelected = (d) => d === dateObj.getDate() && month === dateObj.getMonth() && year === dateObj.getFullYear();
      const isToday = (d) => { const today = new Date(); return d === today.getDate() && month === today.getMonth() && year === today.getFullYear(); };

      return (
        <React.Fragment>
          <div className="fixed inset-0 z-[90]" onClick={onClose}></div>
          <div className="absolute top-0 left-0 w-full z-[100] bg-white rounded-2xl overflow-hidden shadow-2xl animate-[slideDown_0.3s_ease-out] border-2 border-pink-200" onClick={e => e.stopPropagation()}>
            <div className="bg-pink-500 p-4 text-white flex justify-between items-center px-6">
              <button type="button" onClick={prevMonth} className="p-2 hover:bg-white/10 rounded-full cursor-pointer"><Icon name="ChevronLeft" className="w-5 h-5" /></button>
              <h3 className="text-lg font-bold">{year}年 {month + 1}月</h3>
              <button type="button" onClick={nextMonth} className="p-2 hover:bg-white/10 rounded-full cursor-pointer"><Icon name="ChevronRight" className="w-5 h-5" /></button>
            </div>
            <div className="p-4">
              <div className="grid grid-cols-7 gap-1 mb-2 text-center text-pink-300 text-xs font-bold uppercase">{['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d}>{d}</div>)}</div>
              <div className="grid grid-cols-7 gap-1 text-center font-bold">
                {days.map((d, i) => (
                  <div key={i} className="aspect-square flex items-center justify-center">
                    {d && <button type="button" onClick={() => { onSelect(`${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`); onClose(); }} className={`w-9 h-9 rounded-xl font-bold transition-all flex items-center justify-center cursor-pointer ${isSelected(d) ? 'bg-pink-500 text-white shadow-md' : isToday(d) ? 'bg-pink-50 text-pink-700 border border-pink-100' : 'text-gray-700 hover:bg-pink-50'}`}>{d}</button>}
                  </div>
                ))}
              </div>
            </div>
            <div className="text-center pb-4"><button type="button" onClick={onClose} className="text-pink-300 text-xs font-bold uppercase tracking-widest hover:text-pink-500 cursor-pointer">關閉月曆</button></div>
          </div>
        </React.Fragment>
      );
    };

    const CustomMonthPicker = ({ selectedDate, onSelect, onClose }) => {
      const dateObj = new Date(selectedDate);
      const [viewYear, setViewYear] = React.useState(dateObj.getFullYear());
      const currentMonth = dateObj.getMonth();

      const prevYear = () => setViewYear(prev => prev - 1);
      const nextYear = () => setViewYear(prev => prev + 1);

      const isSelected = (m) => {
        return m === currentMonth && viewYear === dateObj.getFullYear();
      };

      const isThisMonth = (m) => {
        const today = new Date();
        return m === today.getMonth() && viewYear === today.getFullYear();
      };

      const months = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];

      return (
        <React.Fragment>
          <div className="fixed inset-0 z-[90]" onClick={onClose}></div>
          <div className="absolute top-0 left-0 w-full z-[100] bg-white rounded-2xl overflow-hidden shadow-2xl animate-[slideDown_0.3s_ease-out] border-2 border-pink-200" onClick={e => e.stopPropagation()}>
            <div className="bg-pink-500 p-4 text-white flex justify-between items-center px-6">
              <button type="button" onClick={prevYear} className="p-2 hover:bg-white/10 rounded-full cursor-pointer"><Icon name="ChevronLeft" className="w-5 h-5" /></button>
              <h3 className="text-lg font-bold">{viewYear}年</h3>
              <button type="button" onClick={nextYear} className="p-2 hover:bg-white/10 rounded-full cursor-pointer"><Icon name="ChevronRight" className="w-5 h-5" /></button>
            </div>
            <div className="p-6">
              <div className="grid grid-cols-3 gap-3 text-center font-bold">
                {months.map((mName, idx) => (
                  <button
                    key={idx}
                    type="button"
                    onClick={() => {
                      onSelect(`${viewYear}-${String(idx + 1).padStart(2, '0')}-01`);
                      onClose();
                    }}
                    className={`py-4 rounded-xl font-bold transition-all flex items-center justify-center cursor-pointer ${isSelected(idx)
                      ? 'bg-pink-500 text-white shadow-md'
                      : isThisMonth(idx)
                        ? 'bg-pink-50 text-pink-700 border border-pink-100'
                        : 'text-gray-700 hover:bg-pink-50'
                      }`}
                  >
                    {mName}
                  </button>
                ))}
              </div>
            </div>
            <div className="text-center pb-4"><button type="button" onClick={onClose} className="text-pink-300 text-xs font-bold uppercase tracking-widest hover:text-pink-500 cursor-pointer">關閉選單</button></div>
          </div>
        </React.Fragment>
      );
    };

    const ReportPage = ({ setView, apiUrl }) => {
      const getTodayString = () => { const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; };
      const [selectedDate, setSelectedDate] = React.useState(getTodayString());
      const [showCalendar, setShowCalendar] = React.useState(false);
      const [data, setData] = React.useState(null);
      const [loading, setLoading] = React.useState(false);
      const [filterCategory, setFilterCategory] = React.useState('全部');

      const handleQuery = () => {
        setLoading(true);
        const dateParts = selectedDate.split('-');
        const queryYearMonth = `${dateParts[0]}/${dateParts[1]}`;

        const callbackName = 'onGetReportResult_' + Date.now();
        window[callbackName] = (res) => {
          setData(res);
          setLoading(false);
          delete window[callbackName];
          const s = document.getElementById(callbackName);
          if (s) s.remove();
        };

        const script = document.createElement('script');
        script.id = callbackName;
        script.src = `${apiUrl}?action=getReport&yearMonth=${encodeURIComponent(queryYearMonth)}&callback=${callbackName}&_t=${Date.now()}`;
        script.onerror = () => {
          setLoading(false);
          if (window[callbackName]) delete window[callbackName];
          const s = document.getElementById(callbackName);
          if (s) s.remove();
        };
        document.body.appendChild(script);
      };

      // 篩選出共同花費（付款方式為 "現金" 或 "信用卡"）
      const commonRows = data ? data.filter(row => row[6] === "現金" || row[6] === "信用卡") : [];

      // 統計結果（只加總共同花費）
      const summary = commonRows.reduce((acc, row) => {
        const cat = row[3];
        const amt = row[5];
        acc[cat] = (acc[cat] || 0) + Number(amt);
        return acc;
      }, {});

      // 庭的支出 (共同)
      const tingTotal = commonRows.filter(row => row[7] === "庭").reduce((sum, row) => sum + Number(row[5]), 0);

      // 珊的支出 (共同)
      const shanTotal = commonRows.filter(row => row[7] === "珊").reduce((sum, row) => sum + Number(row[5]), 0);

      // 共同總支出
      const grandTotal = tingTotal + shanTotal;

      // 提取當月有消費記錄的獨特項目，供篩選選單使用
      const uniqueCategories = data ? Array.from(new Set(data.map(row => row[3]))) : [];

      // 根據篩選器過濾消費明細（明細依然保留所有，包括 -自 方便查閱），並以日排序（日期由近到遠）
      const filteredRows = data
        ? data.filter(row => filterCategory === '全部' || row[3] === filterCategory)
          .sort((a, b) => Number(b[2]) - Number(a[2]))
        : [];

      const filteredTotal = filteredRows.reduce((sum, row) => sum + Number(row[5]), 0);

      return (
        <div className="min-h-screen py-6 px-4">
          <div className="max-w-md mx-auto space-y-4">
            <button onClick={() => setView('input')} className="text-pink-500 font-bold flex items-center mb-2"><Icon name="ChevronLeft" /> 回記帳頁</button>
            <div className={`bg-white rounded-2xl p-6 shadow-sm relative ${showCalendar ? 'z-[50]' : 'z-20'}`}>
              <label className="block font-bold mb-3 flex items-center text-gray-700 text-sm">
                <Icon name="Calendar" className="w-4 h-4 mr-2 text-pink-500" /> 查詢年月
              </label>
              <button type="button" onClick={() => setShowCalendar(true)} className="w-full p-4 bg-pink-50 rounded-2xl border border-pink-50 text-pink-700 font-bold outline-none text-lg text-center active:scale-95 transition-all cursor-pointer">
                {selectedDate.split('-')[0] + ' / ' + selectedDate.split('-')[1]}
              </button>
              {showCalendar && <CustomMonthPicker selectedDate={selectedDate} onSelect={setSelectedDate} onClose={() => setShowCalendar(false)} />}
              <button onClick={handleQuery} className="w-full mt-4 py-4 bg-pink-500 text-white rounded-xl font-bold active:scale-95 transition-all">{loading ? "查詢中..." : "開始查詢"}</button>
            </div>
            {data && (
              <div className="space-y-4">
                <div className="bg-white rounded-2xl p-6 shadow-sm">
                  <h3 className="font-bold text-gray-700 mb-4 text-center">統計結果</h3>
                  {Object.entries(summary)
                    .sort((a, b) => b[1] - a[1])
                    .map(([cat, total]) => (
                      <div key={cat} className="flex justify-between py-2 border-b border-gray-50">
                        <span className="font-bold text-gray-600">{cat}</span>
                        <span className="font-mono font-bold text-pink-600">{total}</span>
                      </div>
                    ))}
                  <div className="mt-4 pt-4 border-t-2 border-pink-100 space-y-2 text-sm font-bold text-gray-700">
                    <div className="flex justify-between">
                      <span>庭的支出</span>
                      <span className="font-mono text-gray-800">{tingTotal}</span>
                    </div>
                    <div className="flex justify-between">
                      <span>珊的支出</span>
                      <span className="font-mono text-gray-800">{shanTotal}</span>
                    </div>
                    <div className="flex justify-between border-t border-gray-100 pt-2 text-lg text-gray-800 font-black">
                      <span>總計</span>
                      <span className="text-pink-700 font-mono">{grandTotal}</span>
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-2xl p-6 shadow-sm">
                  <div className="flex justify-between items-center mb-4">
                    <h3 className="font-bold text-gray-700">消費明細</h3>
                    <div>
                      <select
                        value={filterCategory}
                        onChange={(e) => setFilterCategory(e.target.value)}
                        className="bg-pink-50 text-pink-700 border border-pink-100 rounded-xl px-3 py-1.5 text-xs font-bold focus:outline-none focus:border-pink-300 cursor-pointer"
                      >
                        <option value="全部">全部項目</option>
                        {uniqueCategories.map(cat => (
                          <option key={cat} value={cat}>{cat}</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  <div className="text-[10px] text-gray-400 font-bold mb-3 flex justify-between px-1">
                    <span>顯示篩選後資料：{filteredRows.length} 筆</span>
                    <span className="text-pink-500 font-extrabold">合計金額：{filteredTotal} 元</span>
                  </div>

                  <div className="overflow-x-auto border border-gray-100 rounded-xl">
                    <table className="w-full text-left border-collapse text-xs">
                      <thead>
                        <tr className="bg-pink-500 text-white font-bold text-center">
                          <th className="p-3 whitespace-nowrap">日</th>
                          <th className="p-3 whitespace-nowrap">項目</th>
                          <th className="p-3 whitespace-nowrap">內容</th>
                          <th className="p-3 pr-4 whitespace-nowrap text-right">金額</th>
                          <th className="p-3 whitespace-nowrap">方式</th>
                          <th className="p-3 whitespace-nowrap">誰</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100 font-medium">
                        {filteredRows.length === 0 ? (
                          <tr>
                            <td colSpan="6" className="p-8 text-center text-gray-400 font-bold">無此項目的消費記錄</td>
                          </tr>
                        ) : (
                          filteredRows.map((row, i) => (
                            <tr key={i} className="hover:bg-pink-50/30 text-gray-700 text-center">
                              <td className="p-3 whitespace-nowrap font-mono">{row[2]}</td>
                              <td className="p-3 whitespace-nowrap">{row[3]}</td>
                              <td className="p-3 max-w-[120px] truncate">{row[4]}</td>
                              <td className="p-3 pr-4 whitespace-nowrap text-right font-mono font-bold text-pink-600">{row[5]}</td>
                              <td className="p-3 whitespace-nowrap text-gray-500 text-[10px]">{row[6]}</td>
                              <td className="p-3 whitespace-nowrap">{row[7]}</td>
                            </tr>
                          ))
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const App = () => {
      const [authStatus, setAuthStatus] = React.useState('loading');
      const [apiToken, setApiToken] = React.useState("");
      const [inputToken, setInputToken] = React.useState("");
      const [status, setStatus] = React.useState('idle');
      const [showCalendar, setShowCalendar] = React.useState(false);
      const [view, setView] = React.useState('input');

      const apiUrl = 'https://script.google.com/macros/s/AKfycbxyB9Z2sJHxJ3533aqEYnCxMecQShD5nUBBsfYsJpgeM2aPOXTMKU44gwM8IS7M9eYU/exec';

      const getTodayString = () => { const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; };
      const [fullDate, setFullDate] = React.useState(getTodayString());
      const [formData, setFormData] = React.useState({ user: '', category: '', amount: '', content: '', payment: '' });
      const successRef = React.useRef(null);

      const categories = ["食物", "日用", "交通", "車車", "衣物", "寵物", "電器", "運動", "教育", "娛樂", "醫療", "禮物", "其他"];
      const payments = ["現金", "現金-自", "信用卡", "信用卡-自"];

      const verifyToken = React.useCallback((idToVerify) => {
        if (!idToVerify) return;
        const cleanedId = idToVerify.replace(/["']/g, "").trim();
        setAuthStatus('loading');

        let isMounted = true;
        let timeoutId;

        window.onVerifyResult = (res) => {
          if (!isMounted) return;
          if (timeoutId) clearTimeout(timeoutId);
          if (res && res.auth === 'OK') {
            setApiToken(cleanedId);
            localStorage.setItem('api_token_id', cleanedId);
            setTimeout(() => { if (isMounted) setAuthStatus('authorized'); }, 100);
          } else {
            localStorage.removeItem('api_token_id');
            if (isMounted) {
              setAuthStatus('denied');
              alert('驗證失敗，請確認金鑰是否正確！');
            }
          }
          const s = document.getElementById('v-script');
          if (s) s.remove();
        };

        timeoutId = setTimeout(() => {
          if (isMounted) {
            setAuthStatus('denied');
            alert('連線逾時，請稍後再試！');
          }
          const s = document.getElementById('v-script');
          if (s) s.remove();
        }, 8000);

        const script = document.createElement('script');
        script.id = 'v-script';
        script.src = `${apiUrl}?action=verify&id=${encodeURIComponent(cleanedId)}&callback=onVerifyResult&_t=${Date.now()}`;
        document.body.appendChild(script);
      }, [apiUrl]);

      React.useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        let id = params.get('id');
        if (!id) {
          id = localStorage.getItem('api_token_id');
        }
        if (!id) {
          setAuthStatus('denied');
          return;
        }
        verifyToken(id);
      }, [verifyToken]);

      React.useEffect(() => { if (status === 'success' && successRef.current) successRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, [status]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!formData.user || !formData.category || !formData.amount) return;
        setStatus('loading');
        const dateParts = fullDate.split('-');
        const payload = {
          timestamp: new Intl.DateTimeFormat('zh-TW', { year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true }).format(new Date()),
          yearMonth: `${dateParts[0]}/${dateParts[1]}`,
          day: dateParts[2],
          category: formData.category,
          content: formData.content,
          amount: formData.amount,
          payment: formData.payment,
          user: formData.user,
          api_token: apiToken
        };
        try {
          await fetch(apiUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload), keepalive: true });
          setStatus('success');
          setFormData({ user: '', category: '', amount: '', content: '', payment: '' });
          setFullDate(getTodayString());
        } catch (error) { setStatus('error'); }
      };

      const updateField = (name, value) => setFormData(prev => ({ ...prev, [name]: value }));

      if (authStatus === 'loading') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[#FCE4EC] text-pink-700 font-bold px-10 text-center">
            <div className="space-y-6">
              <Icon name="Loader" className="w-16 h-16 mx-auto text-pink-600" />
              <div className="space-y-2">
                <p className="tracking-[0.2em] uppercase italic text-xl font-black">正在安全驗證中...</p>
                <p className="text-xs text-slate-400 font-medium tracking-widest">正在連線至 Google 伺服器</p>
              </div>
            </div>
          </div>
        );
      }

      if (authStatus === 'denied') {
        const handleManualLogin = (e) => {
          e.preventDefault();
          if (!inputToken.trim()) return;
          verifyToken(inputToken.trim());
        };

        return (
          <div className="min-h-screen flex items-center justify-center bg-[#FCE4EC] px-6 py-12">
            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-xl space-y-6 border border-pink-100 text-center animate-in fade-in duration-300">
              <div className="text-6xl animate-bounce">🔑</div>
              <div className="space-y-2">
                <h2 className="text-2xl font-black text-pink-600 tracking-tight">需要授權金鑰(ID)</h2>
                <p className="text-sm text-gray-500 font-medium">請輸入您的金鑰以載入記帳系統</p>
              </div>
              <form onSubmit={handleManualLogin} className="space-y-4 text-left">
                <div>
                  <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 pl-1">授權金鑰 / ID</label>
                  <input
                    required
                    type="password"
                    placeholder="請貼上或輸入金鑰..."
                    value={inputToken}
                    onChange={(e) => setInputToken(e.target.value)}
                    className="w-full border-2 border-gray-100 hover:border-pink-200 focus:border-pink-500 rounded-2xl py-4 px-5 outline-none transition-all text-base font-mono font-bold text-gray-700 bg-gray-50 placeholder:text-gray-300"
                  />
                </div>
                <button
                  type="submit"
                  className="w-full py-4 rounded-2xl font-bold text-white bg-pink-500 hover:bg-pink-600 shadow-lg shadow-pink-100 transition-all active:scale-95 cursor-pointer text-center text-lg tracking-widest"
                >
                  確認驗證
                </button>
              </form>
              <div className="text-[10px] text-gray-400 font-medium leading-relaxed pt-2 border-t border-gray-50">
                驗證成功後，此裝置將自動記憶金鑰，<br />
                下次即可直接開啟使用。
              </div>
            </div>
          </div>
        );
      }

      if (status === 'success') {
        return (
          <div className="flex items-start justify-center min-h-[600px] h-[80vh] max-w-md mx-auto p-4 transition-all">
            <div ref={successRef} className="bg-white rounded-3xl p-10 text-center shadow-xl w-full animate-in zoom-in duration-300">
              <div className="bg-green-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                <Icon name="CheckCircle2" className="w-12 h-12 text-green-600" />
              </div>
              <h2 className="text-2xl font-bold text-gray-800">記錄成功！</h2>
              <button onClick={() => setStatus('idle')} className="mt-8 w-full py-4 bg-pink-500 text-white rounded-2xl font-bold shadow-lg shadow-pink-100 transition-all active:scale-95 cursor-pointer">繼續記下一筆 ✨</button>
            </div>
          </div>
        );
      }

      if (view === 'report') {
        return <ReportPage setView={setView} apiUrl={apiUrl} />;
      }

      return (
        <div className="min-h-screen py-6 px-4 text-gray-800 pb-32">
          <div className="max-w-md mx-auto space-y-4">
            <div className="bg-white rounded-2xl shadow-sm border-t-8 border-pink-500 p-6 relative overflow-hidden text-center">
              <h1 className="text-2xl font-bold text-gray-800 tracking-tight">養成記帳好習慣!!</h1>
              <p className="text-gray-500 mt-1 text-sm font-medium">今天花了多少呢？</p>
              <button onClick={() => setView('report')} className="absolute bottom-4 right-4 p-3 bg-pink-100 rounded-full text-pink-600 hover:bg-pink-200 transition-all shadow-sm">
                <Icon name="History" className="w-5 h-5" />
              </button>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              {/* 修正：將 p-6 改為 px-8 py-7 達成內容內縮效果 */}
              <section className={`bg-white rounded-2xl px-8 py-7 shadow-sm border-2 border-transparent relative transition-all ${showCalendar ? 'z-[50]' : 'z-20'}`}>
                <label className="block font-bold mb-3 flex items-center text-gray-700 text-sm">
                  <Icon name="Calendar" className="w-4 h-4 mr-2 text-pink-500" /> 交易日期 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <button type="button" onClick={() => setShowCalendar(true)} className="w-full p-4 bg-pink-50 rounded-2xl border border-pink-50 text-pink-700 font-bold outline-none text-lg text-center active:scale-95 transition-all cursor-pointer">
                  {fullDate.replace(/-/g, ' / ')}
                </button>
                {showCalendar && <CustomCalendar selectedDate={fullDate} onSelect={setFullDate} onClose={() => setShowCalendar(false)} />}
              </section>

              <section className="bg-white rounded-2xl px-8 py-7 shadow-sm">
                <label className="block font-bold mb-4 flex items-center text-gray-700 text-sm">
                  <Icon name="User" className="w-4 h-4 mr-2 text-pink-500" /> 是誰花的？ <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <div className="grid grid-cols-2 gap-3">
                  {["庭", "珊"].map(u => (
                    <button key={u} type="button" onClick={() => updateField('user', u)} className={`p-4 rounded-xl border transition-all font-bold text-lg active:scale-90 cursor-pointer ${formData.user === u ? 'bg-pink-100 border-pink-400 text-pink-700 shadow-sm scale-95' : 'bg-gray-50 border-gray-50 text-gray-500'}`}>{u}</button>
                  ))}
                </div>
              </section>

              <section className="bg-white rounded-2xl px-8 py-7 shadow-sm">
                <label className="block font-bold mb-4 flex items-center text-gray-700 text-sm">
                  <Icon name="Tag" className="w-4 h-4 mr-2 text-pink-500" /> 項目 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <div className="grid grid-cols-3 gap-2">
                  {categories.map(c => (
                    <label key={c} className={`flex flex-col items-center justify-center p-4 rounded-xl border transition-all cursor-pointer text-center space-y-1 active:scale-90 ${formData.category === c ? 'bg-pink-100 border-pink-400 shadow-sm scale-95' : 'bg-gray-50 border-gray-50'}`}>
                      <input required type="radio" name="category" checked={formData.category === c} onChange={() => updateField('category', c)} className="hidden" />
                      <span className={`text-lg font-bold ${formData.category === c ? 'text-pink-700' : 'text-gray-500'}`}>{c}</span>
                    </label>
                  ))}
                </div>
              </section>

              <section className="bg-white rounded-2xl px-8 py-7 shadow-sm">
                <label className="block font-bold mb-2 flex items-center text-gray-700 text-sm">
                  <Icon name="DollarSign" className="w-4 h-4 mr-2 text-pink-500" /> 金額 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <input required type="number" inputMode="decimal" placeholder="0" value={formData.amount} onChange={(e) => updateField('amount', e.target.value)} onWheel={(e) => e.target.blur()} className="w-full border-b-2 border-gray-100 py-3 px-4 focus:border-pink-500 outline-none transition-all text-3xl font-mono font-bold text-pink-600 bg-transparent placeholder:text-pink-100" />
              </section>

              <section className="bg-white rounded-2xl px-8 py-7 shadow-sm">
                <label className="block font-bold mb-2 flex items-center text-gray-700 text-sm">
                  <Icon name="PenTool" className="w-4 h-4 mr-2 text-pink-500" /> 內容 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <input required type="text" placeholder="備註..." value={formData.content} onChange={(e) => updateField('content', e.target.value)} className="w-full border-b-2 border-gray-100 py-3 px-4 focus:border-pink-500 outline-none text-lg text-pink-700 font-bold placeholder:text-pink-100" />
              </section>

              <section className="bg-white rounded-2xl px-8 py-7 shadow-sm">
                <label className="block font-bold mb-4 flex items-center text-gray-700 text-sm">
                  <Icon name="CreditCard" className="w-4 h-4 mr-2 text-pink-500" /> 付款方式 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <div className="grid grid-cols-2 gap-3">
                  {payments.map(p => (
                    <label key={p} className={`flex flex-col items-center justify-center p-4 rounded-xl border transition-all cursor-pointer text-center active:scale-90 ${formData.payment === p ? 'bg-pink-100 border-pink-400 shadow-sm scale-95' : 'bg-gray-50 border-gray-50 text-gray-400'}`}>
                      <input required type="radio" name="payment" checked={formData.payment === p} onChange={() => updateField('payment', p)} className="hidden" />
                      <span className={`text-lg font-bold ${formData.payment === p ? 'text-pink-700' : 'text-gray-500'}`}>{p}</span>
                    </label>
                  ))}
                </div>
              </section>

              <div className="pt-4">
                <button type="submit" disabled={status === 'loading'} className={`w-full py-5 rounded-3xl font-bold text-white shadow-xl flex items-center justify-center space-x-3 transition-all active:scale-95 cursor-pointer ${status === 'loading' ? 'bg-pink-200' : 'bg-[#E91E63] shadow-pink-200 hover:bg-[#D81B60]'}`}>
                  {status === 'loading' ? <Icon name="Loader" className="w-6 h-6 animate-spin" /> : <Icon name="CheckCircle2" className="w-6 h-6" />}
                  <span className="text-xl tracking-widest uppercase font-bold">{status === 'loading' ? '傳送中...' : '送出記錄'}</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('Service Worker registered successfully.', reg))
          .catch((err) => console.log('Service Worker registration failed.', err));
      });
    }
  </script>
</body>

</html>
