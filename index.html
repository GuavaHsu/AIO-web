                            alert('驗證失敗，請確認金鑰是否正確！');
                        }
                    }
                    const s = document.getElementById('v-script-shared');
                    if (s) s.remove();
                };

                timeoutId = setTimeout(() => {
                    if (isMounted) {
                        setAuthStatus('denied');
                        alert('連線逾時，請稍後再試！');
                    }
                    const s = document.getElementById('v-script-shared');
                    if (s) s.remove();
                }, 8000);

                const script = document.createElement('script');
                script.id = 'v-script-shared';
                script.src = `${expenseApiUrl}?action=verify&id=${encodeURIComponent(cleanedId)}&callback=onVerifySharedResult&_t=${Date.now()}`;
                document.body.appendChild(script);
            }, [expenseApiUrl]);

            React.useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                let id = params.get('id');
                if (!id) {
                    id = localStorage.getItem('api_token_id');
                }
                if (!id) {
                    setAuthStatus('denied');
                    return;
                }
                verifyToken(id);
            }, [verifyToken]);

            React.useEffect(() => {
                if (activeTab === 'expense') {
                    document.body.className = 'theme-expense';
                    document.documentElement.style.setProperty('--scrollbar-thumb-color', '#F8BBD0');
                } else {
                    document.body.className = 'theme-wine';
                    document.documentElement.style.setProperty('--scrollbar-thumb-color', '#fbbf24');
                }
            }, [activeTab]);

            if (authStatus === 'loading') {
                const loaderColorClass = activeTab === 'expense' ? 'text-pink-600' : 'text-amber-500';
                return (
                    <div className="min-h-screen flex items-center justify-center text-center px-10">
                        <div className="space-y-6">
                            <Icon name="Loader" className={`w-16 h-16 mx-auto ${loaderColorClass}`} />
                            <div className="space-y-2">
                                <p className="tracking-[0.2em] uppercase italic text-xl font-black text-gray-700">正在安全驗證中...</p>
                                <p className="text-xs text-slate-400 font-medium tracking-widest">正在連線至 Google 伺服器</p>
                            </div>
                        </div>
                    </div>
                );
            }

            if (authStatus === 'denied') {
                const handleManualLogin = (e) => {
                    e.preventDefault();
                    if (!inputToken.trim()) return;
                    verifyToken(inputToken.trim());
                };

                const cardBorder = activeTab === 'expense' ? 'border-pink-100' : 'border-amber-900/20';
                const keyColorClass = activeTab === 'expense' ? 'text-pink-600' : 'text-amber-900';
                const buttonBg = activeTab === 'expense' ? 'bg-pink-500 hover:bg-pink-600 shadow-pink-100' : 'bg-amber-900 hover:bg-amber-950 shadow-amber-100';
                const focusBorder = activeTab === 'expense' ? 'focus:border-pink-500 hover:border-pink-200' : 'focus:border-amber-900 hover:border-amber-200';

                return (
                    <div className="min-h-screen flex flex-col">
                        {/* 未登入狀態下依然允許切換 Tab 來變更驗證畫面的主題風格 */}
                        <header className="w-full max-w-md mx-auto px-4 pt-4 pb-2">
                            <div className="glass-card rounded-3xl p-1.5 flex justify-between items-center shadow-lg border border-white/20 backdrop-blur-md bg-white/40">
                                <button
                                    onClick={() => setActiveTab('expense')}
                                    className={`flex-1 py-3 px-4 rounded-2xl font-bold text-sm tracking-widest transition-all duration-300 flex items-center justify-center space-x-1 cursor-pointer ${activeTab === 'expense'
                                        ? 'bg-pink-500 text-white shadow-md scale-[1.02]'
                                        : 'text-gray-500 hover:text-pink-500 bg-transparent'
                                        }`}
                                >
                                    <span>💰</span>
                                    <span>記帳本</span>
                                </button>
                                <button
                                    onClick={() => setActiveTab('wine')}
                                    className={`flex-1 py-3 px-4 rounded-2xl font-bold text-sm tracking-widest transition-all duration-300 flex items-center justify-center space-x-1 cursor-pointer ${activeTab === 'wine'
                                        ? 'bg-amber-900 text-white shadow-md scale-[1.02]'
                                        : 'text-gray-600 hover:text-amber-900 bg-transparent'
                                        }`}
                                >
                                    <span>🍺</span>
                                    <span>微醺時光</span>
                                </button>
                            </div>
                        </header>

                        <div className="flex-1 flex items-center justify-center px-6 py-6 pb-20">
                            <div className={`bg-white rounded-3xl p-8 max-w-md w-full shadow-xl space-y-6 border ${cardBorder} text-center animate-in fade-in duration-300`}>
                                <div className="text-6xl animate-bounce">🔑</div>
                                <div className="space-y-2">
                                    <h2 className={`text-2xl font-black ${keyColorClass} tracking-tight`}>需要授權金鑰(ID)</h2>
                                    <p className="text-sm text-gray-500 font-medium">請輸入您的金鑰以載入系統</p>
                                </div>
                                <form onSubmit={handleManualLogin} className="space-y-4 text-left">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 pl-1">授權金鑰 / ID</label>
                                        <input
                                            required
                                            type="password"
                                            placeholder="請貼上或輸入金鑰..."
                                            value={inputToken}
                                            onChange={(e) => setInputToken(e.target.value)}
                                            className={`w-full border-2 border-gray-100 ${focusBorder} rounded-2xl py-4 px-5 outline-none transition-all text-base font-mono font-bold text-gray-700 bg-gray-50 placeholder:text-gray-300`}
                                        />
                                    </div>
                                    <button
                                        type="submit"
                                        className={`w-full py-4 rounded-2xl font-bold text-white ${buttonBg} shadow-lg transition-all active:scale-95 cursor-pointer text-center text-lg tracking-widest`}
                                    >
                                        確認驗證
                                    </button>
                                </form>
                                <div className="text-[10px] text-gray-400 font-medium leading-relaxed pt-2 border-t border-gray-50">
                                    驗證成功後，此裝置將自動記憶金鑰，<br />
                                    下次即可直接開啟使用。
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {/* 頂端切換 Header */}
                    <header className="sticky top-0 z-[150] w-full max-w-md mx-auto px-4 pt-4 pb-2">
                        <div className="glass-card rounded-3xl p-1.5 flex justify-between items-center shadow-lg border border-white/20 backdrop-blur-md bg-white/40">
                            <button
                                onClick={() => setActiveTab('expense')}
                                className={`flex-1 py-3 px-4 rounded-2xl font-bold text-sm tracking-widest transition-all duration-300 flex items-center justify-center space-x-1 cursor-pointer ${activeTab === 'expense'
                                    ? 'bg-pink-500 text-white shadow-md scale-[1.02]'
                                    : 'text-gray-500 hover:text-pink-500 bg-transparent'
                                    }`}
                            >
                                <span>💰</span>
                                <span>記帳本</span>
                            </button>
                            <button
                                onClick={() => setActiveTab('wine')}
                                className={`flex-1 py-3 px-4 rounded-2xl font-bold text-sm tracking-widest transition-all duration-300 flex items-center justify-center space-x-1 cursor-pointer ${activeTab === 'wine'
                                    ? 'bg-amber-900 text-white shadow-md scale-[1.02]'
                                    : 'text-gray-600 hover:text-amber-900 bg-transparent'
                                    }`}
                            >
                                <span>🍺</span>
                                <span>微醺時光</span>
                            </button>
                        </div>
                    </header>

                    {/* 主要內容渲染區 */}
                    <main className="flex-1">
                        {activeTab === 'expense' ? <ExpenseApp apiToken={apiToken} /> : <WineApp apiToken={apiToken} />}
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <script>
        // 註冊記帳 PWA Service Worker，保留其 PWA 功能
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./記帳網頁/sw.js')
                    .then((reg) => console.log('Service Worker registered successfully.', reg))
                    .catch((err) => console.log('Service Worker registration failed.', err));
            });
        }
    </script>
</body>

</html>
